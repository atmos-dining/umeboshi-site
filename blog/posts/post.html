<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ブログ｜食堂 うめぼし</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../../images/umeboshi_icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX');
</script>
<style>
  .post-hero {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    border-radius: 4px;
    margin-bottom: 28px;
    display: block;
  }
  .post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .post-date {
    font-size: 12px;
    color: #999;
    letter-spacing: 0.06em;
  }
  .post-tag {
    font-size: 11px;
    padding: 2px 10px;
    border-radius: 2px;
    background: var(--primary-soft);
    color: var(--primary);
    border: 1px solid rgba(165,32,32,0.2);
  }
  .post-title {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 24px;
    letter-spacing: 0.03em;
  }
  .post-body {
    font-size: 15px;
    line-height: 1.9;
    color: #333;
    max-width: 720px;
  }
  .post-body h2 {
    font-size: 20px;
    font-weight: 700;
    margin: 32px 0 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--primary);
  }
  .post-body h3 {
    font-size: 17px;
    font-weight: 700;
    margin: 24px 0 10px;
  }
  .post-body p { margin: 0 0 16px; }
  .post-body ul, .post-body ol {
    padding-left: 1.6em;
    margin-bottom: 16px;
  }
  .post-body img {
    max-width: 100%;
    height: auto;
    border-radius: 4px;
    margin: 12px 0;
  }
  .post-back {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid #eee;
  }
</style>
</head>

<body data-page="blog">
<div id="shared-header"></div>

<main id="main">

  <section class="section page-head" id="post-section">
    <div class="section-inner" style="max-width:760px;">
      <p id="post-loading" style="text-align:center; color:#888; padding:60px 0;">読み込み中…</p>
    </div>
  </section>

  <div id="shared-bottom"></div>
  <a href="#" class="page-top" aria-label="ページの先頭へ"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg></a>

</main>

<script src="../../common.js"></script>
<script>
(function () {
  function esc(s) {
    return String(s ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;')
      .replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#39;");
  }
  function fmtDate(d) {
    const m = String(d || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
    return m ? `${m[1]}年${m[2]}月${m[3]}日` : esc(d || '');
  }

  const slug = decodeURIComponent(location.hash.slice(1)) || new URLSearchParams(location.search).get('slug');
  const section = document.getElementById('post-section');

  if (!slug) {
    section.innerHTML = '<div class="section-inner"><p style="text-align:center;color:#888;padding:60px 0;">記事が見つかりませんでした。</p></div>';
    return;
  }

  fetch('../../blog/posts.json', { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      const posts = data.posts ?? data;
      const post = posts.find(p => p.slug === slug);
      if (!post) throw new Error('not found');

      document.title = `${post.title}｜食堂 うめぼし`;

      let imgSrc = '';
      if (post.image) {
        imgSrc = post.image
          .replace(/^\.\//, '../../')
          .replace(/^\.\.\//, '../../');
      }

      const rawBody = post.body || `<p>${esc(post.excerpt)}</p>`;
      const bodyHtml = (typeof marked !== 'undefined' && !rawBody.trimStart().startsWith('<'))
        ? marked.parse(rawBody)
        : rawBody;

      const tags = Array.isArray(post.tags) ? post.tags : [];

      section.innerHTML = `
        <div class="section-inner" style="max-width:760px;">
          <div class="post-meta">
            <time class="post-date" datetime="${esc(post.date)}">${fmtDate(post.date)}</time>
            ${tags.map(t => `<span class="post-tag">${esc(t)}</span>`).join('')}
          </div>
          <h1 class="post-title">${esc(post.title)}</h1>
          ${imgSrc ? `<img src="${esc(imgSrc)}" alt="${esc(post.title)}" class="post-hero">` : ''}
          <div class="post-body">${bodyHtml}</div>
          <div class="post-back">
            <a href="../index.html" class="btn-secondary">← ブログ一覧に戻る</a>
          </div>
        </div>`;
    })
    .catch(() => {
      section.innerHTML = '<div class="section-inner"><p style="text-align:center;color:#888;padding:60px 0;">記事が見つかりませんでした。</p></div>';
    });
})();
</script>

</body>
</html>
